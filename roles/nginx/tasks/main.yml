- name: install nginx packages
  tags: nginx
  package:
    name: "{{ nginx_package }}"
    state: latest

- name: start nginx
  tags: nginx
  service:
    name: nginx.service
    state: started
    enabled: yes

- name: copy default html file to server
  tags: copy, nginx
  copy:
    src: default_site.html
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: '0644'
